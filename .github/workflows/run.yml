name: Bazos Scanner

on:
  schedule:
    - cron: '*/20 * * * *'   # každých 20 minút
  workflow_dispatch:           # manuálne spustenie tlačidlom

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repozitara
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inštalácia knižníc
        run: pip install -r requirements.txt

      - name: Spusti scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python barzos.py

      - name: Ulož seen_ads.json späť do repozitára
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_ads.json || true
          git diff --staged --quiet || git commit -m "Update seen ads"
          git push
